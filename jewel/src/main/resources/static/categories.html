<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Categories</title>
  <style>
    body { font-family: Arial, sans-serif; text-align: center; padding: 40px; }
    .list { display: flex; justify-content: center; flex-wrap: wrap; gap: 20px; }
    .item {
      padding: 15px;
      border: 1px solid #ccc;
      border-radius: 8px;
      cursor: pointer;
      background: #f5f5f5;
      width: 200px;
      text-align: center;
      transition: 0.3s;
    }
    .item:hover { background: #ddd; transform: scale(1.05); }
  </style>
</head>
<body>
  <h1>📂 Categories</h1>
  <div class="list" id="categories"></div>

  <script>
    async function loadCategories() {
      const params = new URLSearchParams(window.location.search);
      const jewelTypeId = params.get("jewelTypeId"); // comes from jeweltypes.html

      // Call backend
      const res = await fetch(`/categories/jeweltype/${jewelTypeId}`);
      const data = await res.json();

      const container = document.getElementById("categories");
      container.innerHTML = "";

      if (data.length === 0) {
        container.innerHTML = "<p>No categories found for this jewel type.</p>";
        return;
      }

      data.forEach(cat => {
        const div = document.createElement("div");
        div.className = "item";
        div.innerText = cat.name;
        div.onclick = () => {
          // Go to product page with categoryId
          window.location.href = `/product.html?categoryId=${cat.id}`;
        };
        container.appendChild(div);
      });
    }

    loadCategories();
  </script>
</body>
</html>
