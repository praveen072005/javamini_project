<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Products</title>
  <style>
    body { font-family: Arial, sans-serif; text-align: center; padding: 40px; }
    .grid { display: flex; justify-content: center; flex-wrap: wrap; gap: 20px; }
    .card {
      width: 200px; border: 1px solid #ccc; border-radius: 10px;
      padding: 10px; background: #fafafa; transition: 0.3s;
    }
    .card:hover { background: #eee; transform: scale(1.05); }
    img { width: 100%; border-radius: 8px; }
  </style>
</head>
<body>
  <h1>🛍 Products</h1>
  <div class="grid" id="products"></div>

  <script>
    async function loadProducts() {
      const params = new URLSearchParams(window.location.search);
      const categoryId = params.get("categoryId");

      // Backend call
      const res = await fetch(`/products/category/${categoryId}`);
      const data = await res.json();

      const container = document.getElementById("products");
      container.innerHTML = "";

      if (data.length === 0) {
        container.innerHTML = "<p>No products found for this category.</p>";
        return;
      }

      data.forEach(prod => {
        const div = document.createElement("div");
        div.className = "card";
        div.innerHTML = `
          <img src="${prod.imageUrl}" alt="${prod.name}" />
          <h3>${prod.name}</h3>
          <p>Model: ${prod.model_number}</p>
        `;
        container.appendChild(div);
      });
    }

    loadProducts();
  </script>
</body>
</html>
