<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Jewel App - Auth</title>
  <style>
    body { font-family: Arial, sans-serif; text-align: center; padding: 40px; }
    .box { border: 1px solid #ccc; padding: 20px; margin: 20px auto; width: 300px; border-radius: 10px; }
    input { width: 90%; padding: 10px; margin: 5px; border-radius: 5px; border: 1px solid #aaa; }
    button { padding: 10px 20px; margin: 10px; border: none; background: teal; color: white; border-radius: 5px; cursor: pointer; }
    button:hover { background: darkcyan; }
  </style>
</head>
<body>
  <h1>💎 Jewel App</h1>

  <div class="box">
    <h2>Signup</h2>
    <input type="text" id="signupUsername" placeholder="Username" />
    <input type="password" id="signupPassword" placeholder="Password" />
    <button onclick="signup()">Signup</button>
    <p id="signupMsg"></p>
  </div>

  <div class="box">
    <h2>Signin</h2>
    <input type="text" id="signinUsername" placeholder="Username" />
    <input type="password" id="signinPassword" placeholder="Password" />
    <button onclick="signin()">Signin</button>
    <p id="signinMsg"></p>
  </div>

<script>
  async function signup() {
    const username = document.getElementById("signupUsername").value;
    const password = document.getElementById("signupPassword").value;

    const res = await fetch("/auth/signup", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ username, password })
    });

    const msg = await res.text();
    document.getElementById("signupMsg").innerText = msg;
  }

  async function signin() {
    const username = document.getElementById("signinUsername").value;
    const password = document.getElementById("signinPassword").value;

    const res = await fetch("/auth/signin", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ username, password })
    });

    const msg = await res.text();
    document.getElementById("signinMsg").innerText = msg;

    if (msg.includes("successful")) {
      // ✅ Redirect on success
      window.location.href = "/jeweltypes.html";
    }
  }
</script>
