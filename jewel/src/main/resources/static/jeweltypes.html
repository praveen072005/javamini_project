<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Jewel Types</title>
  <style>
    body { font-family: Arial, sans-serif; text-align: center; padding: 40px; }
    .container { display: flex; justify-content: center; flex-wrap: wrap; gap: 20px; }
    .card {
      width: 150px; padding: 20px; border: 1px solid #ccc; border-radius: 10px;
      cursor: pointer; background: #f9f9f9; transition: 0.3s;
    }
    .card:hover { background: #eee; transform: scale(1.05); }
  </style>
</head>
<body>
  <h1>💎 Jewel Types</h1>
  <div class="container" id="jewelTypes"></div>

  <script>
    // Load jewel types from backend
    async function loadJewelTypes() {
      try {
        const res = await fetch("/api/jewels/all-types");
        if (!res.ok) throw new Error("Failed to fetch jewel types");
        const data = await res.json();

        const container = document.getElementById("jewelTypes");
        container.innerHTML = "";

        data.forEach(jewel => {
          const div = document.createElement("div");
          div.className = "card";
          div.innerHTML = `<h3>${jewel.name}</h3><p>${jewel.description}</p>`;
          
          // Click redirects to categories page with jewelTypeId in URL
          div.onclick = () => {
            window.location.href = `/categories.html?jewelTypeId=${jewel.id}`;
          };

          container.appendChild(div);
        });
      } catch (err) {
        console.error(err);
        const container = document.getElementById("jewelTypes");
        container.innerHTML = "<p>Failed to load jewel types.</p>";
      }
    }

    // Initialize
    loadJewelTypes();
  </script>
</body>
</html>
